<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>masterboard — 현태</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --text: #0f172a;
  --text-dim: #475569;
  --text-faint: #94a3b8;
  --accent: #3b82f6;
  --danger: #dc2626;
  --warning: #d97706;
  --success: #16a34a;
  --radius: 12px;
  --shadow: 0 1px 2px rgba(15,23,42,0.04), 0 4px 16px rgba(15,23,42,0.05);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ===== Top nav ===== */
.top-nav {
  position: sticky; top: 0; z-index: 10;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  height: 54px;
  display: flex; align-items: center;
  padding: 0 24px;
}
.brand { font-size: 1rem; font-weight: 800; margin-right: auto; letter-spacing: -0.01em; color: var(--text); }
.brand b { color: var(--accent); }
.nav-link {
  padding: 7px 14px; border-radius: 8px;
  color: var(--text-dim); text-decoration: none;
  font-size: 0.8rem; font-weight: 600;
  transition: all 0.15s;
}
.nav-link:hover { background: var(--bg); color: var(--text); }

.container { max-width: 880px; margin: 0 auto; padding: 36px 20px 80px; }

/* ===== Section ===== */
section { margin-bottom: 44px; }
.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 14px; padding: 0 2px;
}
.section-title {
  font-size: 0.72rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1.6px;
  color: var(--text-faint);
}
.section-count { font-size: 0.75rem; color: var(--text-faint); font-variant-numeric: tabular-nums; }
.section-more { font-size: 0.75rem; color: var(--accent); text-decoration: none; font-weight: 600; }
.section-more:hover { text-decoration: underline; }

/* ===== Today ===== */
.today-list { display: flex; flex-direction: column; gap: 8px; }
.task-row {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow); transition: all 0.15s;
  text-decoration: none; color: inherit;
}
.task-row:hover { border-color: var(--border-strong); transform: translateX(2px); }
.task-priority { width: 4px; align-self: stretch; border-radius: 2px; flex-shrink: 0; min-height: 38px; }
.task-priority.high { background: var(--danger); }
.task-priority.mid  { background: var(--warning); }
.task-priority.low  { background: var(--text-faint); }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 0.9rem; font-weight: 600; color: var(--text); line-height: 1.45; word-break: keep-all; }
.task-meta {
  font-size: 0.72rem; color: var(--text-faint);
  margin-top: 4px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 6px;
  font-size: 0.7rem; font-weight: 700;
}
.today-empty {
  text-align: center; padding: 40px 20px;
  color: var(--text-faint); font-size: 0.85rem;
  background: var(--surface);
  border: 1px dashed var(--border); border-radius: var(--radius);
}

/* ===== Projects ===== */
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.project-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: var(--shadow); transition: all 0.18s;
  position: relative; overflow: hidden;
}
.project-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--card-color, var(--accent));
}
.project-card:hover { transform: translateY(-3px); box-shadow: 0 2px 4px rgba(15,23,42,0.05), 0 12px 28px rgba(15,23,42,0.08); }
.project-card.paused { opacity: 0.62; }
.project-card.paused:hover { opacity: 0.85; }

.project-top { display: flex; align-items: center; gap: 12px; }
.project-icon {
  width: 42px; height: 42px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem;
  background: var(--card-bg, rgba(59,130,246,0.12));
}
.project-name { font-size: 1rem; font-weight: 800; color: var(--text); line-height: 1.2; }
.project-status {
  font-size: 0.68rem; font-weight: 700;
  color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.8px;
  margin-top: 2px;
}
.project-oneliner { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; word-break: keep-all; }
.project-phase {
  font-size: 0.72rem; color: var(--text); background: var(--bg);
  padding: 5px 10px; border-radius: 6px;
  align-self: flex-start; font-weight: 600;
}
.project-metrics {
  display: flex; gap: 14px; font-size: 0.72rem; color: var(--text-dim);
  margin-top: auto; padding-top: 10px; border-top: 1px dashed var(--border);
}
.project-metrics b { color: var(--text); font-weight: 800; font-variant-numeric: tabular-nums; }
.project-metrics .sep { margin-left: auto; color: var(--text-faint); }
.progress-bar {
  position: relative; height: 4px; background: var(--bg);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background: var(--card-color, var(--accent));
  transition: width 0.4s ease;
}

/* ===== Devlog ===== */
.devlog-list { display: flex; flex-direction: column; gap: 6px; }
.devlog-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 0.82rem; color: var(--text);
  text-decoration: none; transition: all 0.15s;
}
.devlog-row:hover { border-color: var(--border-strong); background: #fdfdfe; }
.devlog-date { font-size: 0.72rem; color: var(--text-faint); font-variant-numeric: tabular-nums; flex-shrink: 0; width: 74px; }
.devlog-title { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ===== Responsive ===== */
@media (max-width: 640px) {
  .top-nav { padding: 0 16px; }
  .container { padding: 24px 16px 60px; }
  .project-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">🗂 master<b>board</b></div>
  <a href="devlog.html" class="nav-link">📝 devlog</a>
</nav>

<main class="container">

  <!-- Today -->
  <section>
    <div class="section-head">
      <div class="section-title">Today · 지금 집중</div>
      <div class="section-count" id="todayCount"></div>
    </div>
    <div class="today-list" id="todayList"></div>
  </section>

  <!-- Projects -->
  <section>
    <div class="section-head">
      <div class="section-title">Projects</div>
      <div class="section-count" id="projectCount"></div>
    </div>
    <div class="project-grid" id="projectGrid"></div>
  </section>

  <!-- Recent devlog -->
  <section>
    <div class="section-head">
      <div class="section-title">Recent devlog</div>
      <a href="devlog.html" class="section-more">전체 보기 →</a>
    </div>
    <div class="devlog-list" id="devlogList"></div>
  </section>

</main>

<script src="project-data.js"></script>
<script src="devlog/index.js"></script>
<script>
(function () {
  const data = window.PROJECT_DATA;
  if (!data) {
    document.querySelector('main').innerHTML = '<p style="color:#dc2626">project-data.js 를 불러오지 못했습니다.</p>';
    return;
  }
  const projectBySlug = Object.fromEntries(data.projects.map(p => [p.slug, p]));

  // ---------- Today (status === 'now') ----------
  const priorityOrder = { high: 0, mid: 1, low: 2 };
  const nowTasks = data.tasks
    .filter(t => t.status === 'now')
    .sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

  document.getElementById('todayCount').textContent = nowTasks.length ? `${nowTasks.length}개` : '';

  const todayList = document.getElementById('todayList');
  if (nowTasks.length === 0) {
    todayList.innerHTML = `<div class="today-empty">Now 상태 태스크 없음 — 프로젝트 상세에서 하나씩 끌어올려보자.</div>`;
  } else {
    todayList.innerHTML = nowTasks.map(t => {
      const p = projectBySlug[t.project] || {};
      const color = p.themeColor || '#3b82f6';
      return `
        <a class="task-row" href="project.html?slug=${encodeURIComponent(t.project)}">
          <div class="task-priority ${t.priority}"></div>
          <div class="task-body">
            <div class="task-title">${esc(t.title)}</div>
            <div class="task-meta">
              <span class="pill" style="background:${color}1a;color:${color}">${p.icon || ''} ${esc(p.name || t.project)}</span>
              ${t.phase ? `<span>· ${esc(t.phase)}</span>` : ''}
              <span>· priority <b style="color:var(--text-dim)">${t.priority}</b></span>
            </div>
          </div>
        </a>
      `;
    }).join('');
  }

  // ---------- Projects ----------
  document.getElementById('projectCount').textContent = `${data.projects.length}개`;
  const projectGrid = document.getElementById('projectGrid');
  projectGrid.innerHTML = data.projects.map(p => {
    const tasks = data.tasks.filter(t => t.project === p.slug);
    const done = tasks.filter(t => t.status === 'done' || t.status === 'archived').length;
    const total = tasks.length;
    const progress = total ? Math.round(done / total * 100) : 0;
    const nowCount = tasks.filter(t => t.status === 'now').length;
    const nextCount = tasks.filter(t => t.status === 'next').length;
    const color = p.themeColor || '#3b82f6';
    const iconBg = hexToRgba(color, 0.14);

    return `
      <a class="project-card ${p.status === 'paused' ? 'paused' : ''}"
         style="--card-color:${color}; --card-bg:${iconBg}"
         href="project.html?slug=${encodeURIComponent(p.slug)}">
        <div class="project-top">
          <div class="project-icon">${p.icon || '📁'}</div>
          <div>
            <div class="project-name">${esc(p.name)}</div>
            <div class="project-status">${esc(p.status)}</div>
          </div>
        </div>
        <div class="project-oneliner">${esc(p.oneLiner || '')}</div>
        <div class="project-phase">${esc(p.currentPhase || '')}</div>
        <div class="project-metrics">
          <span>Now <b>${nowCount}</b></span>
          <span>Next <b>${nextCount}</b></span>
          <span class="sep">${done} / ${total}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </a>
    `;
  }).join('');

  // ---------- Recent devlog ----------
  // window.DEVLOG_INDEX (devlog/index.js) 에서 최신 3개 자동 렌더.
  // 갱신: `python3 update-devlog-index.py` 실행 시 index.js 재생성.
  const allDevlog = (window.DEVLOG_INDEX || []).slice()
    .sort((a,b) => (b.date+b.file).localeCompare(a.date+a.file));
  const recentDevlog = allDevlog.slice(0, 3);
  document.getElementById('devlogList').innerHTML = recentDevlog.map(d => {
    const p = projectBySlug[d.project] || {};
    const color = p.themeColor || '#64748b';
    return `
      <a class="devlog-row" href="devlog.html?file=${encodeURIComponent(d.file)}">
        <span class="devlog-date">${d.date}</span>
        <span class="pill" style="background:${color}1a;color:${color}">${p.icon || ''} ${esc(p.name || d.project)}</span>
        <span class="devlog-title">${esc(d.title)}</span>
      </a>
    `;
  }).join('');

  // ---------- helpers ----------
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }
  function hexToRgba(hex, alpha) {
    const h = hex.replace('#', '');
    const n = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
    const r = parseInt(n.slice(0,2), 16);
    const g = parseInt(n.slice(2,4), 16);
    const b = parseInt(n.slice(4,6), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
})();
</script>

</body>
</html>
