<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.header{text-align:center;margin-bottom:48px}
.header h1{font-size:2rem;font-weight:800;color:#f8fafc;margin-bottom:8px}
.header h1 span{color:#3b82f6}
.header p{font-size:0.95rem;color:#64748b}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:680px}
@media(max-width:600px){.cards{grid-template-columns:1fr}}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px 28px;text-decoration:none;color:inherit;transition:all 0.2s;display:flex;flex-direction:column;gap:12px}
.card:hover{border-color:#3b82f6;background:#1e3a5f;transform:translateY(-2px)}
.card-icon{font-size:2rem}
.card-title{font-size:1.1rem;font-weight:700;color:#f1f5f9}
.card-desc{font-size:0.85rem;color:#64748b;line-height:1.5}
.card-arrow{font-size:0.8rem;color:#3b82f6;margin-top:auto;padding-top:8px}
</style>
</head>
<body>
<div class="header">
  <h1><span>My</span> Dashboard</h1>
  <p>관리 도구 모음</p>
</div>
<div class="cards">
  <a href="project-dashboard.html" class="card">
    <div class="card-icon">📋</div>
    <div class="card-title">프로젝트 관리</div>
    <div class="card-desc">프로젝트 진행 상황, 일정, 통계를 한눈에 확인</div>
    <div class="card-arrow">바로가기 →</div>
  </a>
  <a href="blog-upload-dashboard.html" class="card">
    <div class="card-icon">✍️</div>
    <div class="card-title">블로그 업로드</div>
    <div class="card-desc">네이버 블로그 포스트 업로드 현황 및 관리</div>
    <div class="card-arrow">바로가기 →</div>
  </a>
</div>
</body>
</html>
